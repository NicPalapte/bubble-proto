<style>

    --paper:#f5f7fa; --panel:#fbfcfd; --white:#ffffff;
    --grid:#e4ecf4; --grid2:#d6e0ec; --line:#c9d4e0; --line2:#a9bbcf;

  }
  *,*::before,*::after{ box-sizing:border-box; }
  html,body{ margin:0; padding:0; height:100%; background:var(--paper); color:var(--ink);

  ::-webkit-scrollbar{ width:8px; height:8px } ::-webkit-scrollbar-thumb{ background:#c9d4e0; border-radius:4px }
  ::-webkit-scrollbar-track{ background:transparent }
  button{ font:inherit; color:inherit; }
